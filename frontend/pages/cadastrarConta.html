<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Monitor de Sono</title>
    <link rel="stylesheet" href="../Css/cadastro.css">
</head>
<body>

<div class="container">
    <div class="login-box">
        <h1>CADASTRO</h1>

        <form id="loginForm">
            <input type="text" id="usuario" placeholder="Usuário" required>
            <input type="password" id="senha" placeholder="Senha" required>
            <input type="email" id="email" placeholder="Email" required>
            <input type="text" id="cpf" placeholder="CPF" required>
            <input type="text" id="placa" placeholder="Placa" required>
            <input type="date" id="datadenascimento" placeholder="Data De Nascimento" required>



        

            <button type="submit">ENTRAR</button>
        </form>

        <p class="erro" id="erroMsg"></p>

        <p class="cadastro">
        Já tem conta? <a href="../pages/logarConta.html">Clique aqui!</a>
    </p>
</p>

        
    </div>
</div>

<script src="../Js/cadastro.js"></script>
</body>
</html>
