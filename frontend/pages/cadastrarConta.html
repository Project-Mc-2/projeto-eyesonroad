<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Monitor de Sono</title>
    <link rel="stylesheet" href="/frontend/Css/cadastro.css">
</head>
<body>

<div class="container">
    <div class="login-box">
        <h1>CADASTRO</h1>

        <form id="loginForm">
            <input type="text" id="usuario" placeholder="Usuário" required>
            <input type="password" id="senha" placeholder="Senha" required>
            <input type="email" id="email" placeholder="Email" required>
            <input type="cpf" id="cpf" placeholder="Cpf" required>
            <input type="placa" id="placa" placeholder="Placa" required>


        

            <button type="submit">ENTRAR</button>
        </form>

        <p class="erro" id="erroMsg"></p>

        
    </div>
</div>

<script src="/frontend/Js/cadastro.js"></script>
</body>
</html>
