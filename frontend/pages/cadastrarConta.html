<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Monitor de Sono</title>
    <link rel="stylesheet" href="../Css/cadastro.css">
</head>
<body>

<div class="container">
    <div class="login-box">
        <h1>CADASTRO</h1>

        <form id="loginForm">

    <div class="linha">
        <input type="email" id="email" placeholder="Email" required>
    </div>

    <div class="linha">
        <input type="password" id="senha" placeholder="Senha" required>
        <input type="text" id="cpf" placeholder="CPF" required>
    </div>

    <div class="linha">
        <input type="text" id="placa" placeholder="Placa" required>
        <input type="text" id="telefone" placeholder="Telefone" required>
    </div>

    <input type="date" id="dataDeNascimento" required>

    <button type="submit">CADASTRAR</button>

</form>
        <p class="erro" id="erroMsg"></p>

        <p class="cadastro">
            Já tem conta? <a href="../pages/logarConta.html">Clique aqui!</a>
        </p>
    </div>
</div>

<script src="../Js/cadastro.js"></script>
</body>
</html>
