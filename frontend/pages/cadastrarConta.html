<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
    <link rel="stylesheet" href="/frontend/Css/cadastro.css">

    <!-- Fonte -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

    <!-- Ícones -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="main-container">
        <div class="left-panel">
            <div class="welcome-box">
                <h2>Seja Bem-Vindo!<br>Já tem conta?<br>faça seu login!</h2>
            </div>

            <a href="/frontend/pages/logarConta.html" class="login-btn">Logar Conta</a>
        </div>

        <div class="right-panel">
            <h1>Criar Conta</h1>
            
            <form class="form-container">
                <div class="input-group">
                    <i class="fa-regular fa-user-circle"></i>
                    <div class="divider"></div>
                    <input type="text" placeholder="Nome completo">
                </div>

                <div class="input-group">
                    <i class="fa-regular fa-envelope"></i>
                    <div class="divider"></div>
                    <input type="email" placeholder="Seu melhor e-mail">
                </div>

                <div class="input-group">
                    <i class="fa-solid fa-address-card"></i>
                    <div class="divider"></div>
                    <input type="text" placeholder="CPF">
                </div>

                <div class="input-group">
                    <i class="fa-solid fa-car"></i>
                    <div class="divider"></div>
                    <input type="text" placeholder="Placa do Veículo">
                </div>

                <div class="input-group">
                    <i class="fa-solid fa-lock"></i>
                    <div class="divider"></div>
                    <input type="password" placeholder="Crie uma senha">
                </div>

                <button type="submit" class="submit-btn">Cadastrar Agora</button>
            </form>
        </div>
    </div>

</body>
</html>
