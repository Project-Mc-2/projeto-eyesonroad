<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Página Login</title>
<link rel="stylesheet" href="style.css">

</head>
<body>

<div class="container">

    <div class="left">
        <h2>Logar Conta</h2>

        <div class="input-box">
            <input type="text" id="cpf" placeholder="CPF">
        </div>

        <div class="input-box">
            <input type="text" id="placa" placeholder="Placa">
        </div>

        <div class="input-box">
            <input type="password" id="senha" placeholder="Senha">
        </div>

        <button class="login-btn" onclick="logar()">Logar conta</button>
    </div>

    <!-- LADO DIREITO -->
    <div class="right">
        <div class="overlay">
            <h2>Seja Bem-Vindo!</h2>
            <p>Já tem conta?<br>faça seu login!</p>
            <button class="create-btn" onclick="criarConta()">Criar conta</button>
        </div>
    </div>

</div>

</body>
</html>
