<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>

    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="cadastro.css">
</head>
<body>

<div class="main-container">
    <div class="left-panel">
        <div class="welcome-box">
            <h2>Seja Bem-Vindo!<br>Já tem conta?<br>Faça seu login!</h2>
        </div>

        <button class="login-btn" onclick="irLogin()">Logar Conta</button>
    </div>

    <div class="right-panel">
        <h1>Criar Conta</h1>

        <form class="form-container" onsubmit="return cadastrar()">
            
            <div class="input-group">
                <input type="text" id="nome" placeholder="Nome completo" required>
            </div>

            <div class="input-group">
                <input type="email" id="email" placeholder="Seu e-mail" required>
            </div>

            <div class="input-group">
                <input type="text" id="cpfCadastro" placeholder="CPF" required>
            </div>

            <div class="input-group">
                <input type="text" id="placaCadastro" placeholder="Placa do Veículo" required>
            </div>

            <div class="input-group">
                <input type="password" id="senhaCadastro" placeholder="Crie uma senha" required>
            </div>

            <button type="submit" class="submit-btn">Cadastrar Agora</button>
        </form>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
