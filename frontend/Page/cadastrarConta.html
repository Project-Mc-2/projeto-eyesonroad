<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro </title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Roboto', sans-serif;
        }

        /* Faz o body ocupar 100% da tela sem scroll */
        body, html {
            height: 100%;
            width: 100%;
            overflow: hidden;
        }

        .main-container {
            display: flex;
            width: 100vw;
            height: 100vh;
        }

        /* --- LADO ESQUERDO (IMAGEM) --- */
        .left-panel {
            flex: 1;
            background-image: url('/Img/image.png');
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .left-panel::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.3); /* Escurece levemente a foto */
            z-index: 1;
        }

        .welcome-box {
            background-color: rgba(10, 15, 45, 0.8);
            backdrop-filter: blur(5px);
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            color: #ffffff;
            z-index: 2;
            margin-bottom: 25px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .welcome-box h2 {
            font-size: 1.8rem;
            line-height: 1.3;
        }

        .login-btn {
            background-color: #070d2b;
            color: #ffffff;
            border: none;
            padding: 15px 40px;
            font-size: 1.1rem;
            font-weight: 500;
            border-radius: 10px;
            cursor: pointer;
            z-index: 2;
            transition: transform 0.2s;
        }

        .login-btn:hover {
            transform: scale(1.05);
        }

        /* --- LADO DIREITO (CADASTRO CLARO) --- */
        .right-panel {
            flex: 1;
            background-color: #f4f7fa; /* Fundo claro em vez de preto */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
        }

        .right-panel h1 {
            color: #070a1a; /* Texto escuro para contrastar */
            font-size: 2rem;
            margin-bottom: 30px;
        }

        .form-container {
            width: 100%;
            max-width: 400px; /* Um pouco mais largo para telas grandes */
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .input-group {
            display: flex;
            align-items: center;
            background-color: #ffffff; /* Input branco */
            border-radius: 10px;
            padding: 12px 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05); /* Sombra leve */
            border: 1px solid #e0e0e0;
        }

        .input-group i {
            color: #070d2b;
            font-size: 1.3rem;
            width: 30px;
        }

        .divider {
            width: 1px;
            height: 25px;
            background-color: #ccc;
            margin: 0 15px;
        }

        .input-group input {
            border: none;
            background: transparent;
            outline: none;
            width: 100%;
            color: #333;
            font-size: 1rem;
        }

        .submit-btn {
            background-color: #070d2b; /* Botão escuro para destaque */
            color: #ffffff;
            border: none;
            padding: 15px;
            font-size: 1.2rem;
            font-weight: 700;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 20px;
            width: 100%;
            transition: background 0.3s;
        }

        .submit-btn:hover {
            background-color: #1a2a6c;
        }

        /* Ajuste para celulares */
        @media (max-width: 800px) {
            .main-container {
                flex-direction: column;
                overflow-y: auto;
            }
            .left-panel {
                height: 40vh;
                min-height: 300px;
            }
            .right-panel {
                height: auto;
                padding: 40px 20px;
            }
        }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="left-panel">
            <div class="welcome-box">
                <h2>Seja Bem-Vindo!<br>Já tem conta?<br>faça seu login!</h2>
            </div>
            <button class="login-btn">Logar Conta</button>
        </div>

        <div class="right-panel">
            <h1>Criar Conta</h1>
            
            <form class="form-container">
                <div class="input-group">
                    <i class="fa-regular fa-user-circle"></i>
                    <div class="divider"></div>
                    <input type="text" placeholder="Nome completo">
                </div>

                <div class="input-group">
                    <i class="fa-regular fa-envelope"></i>
                    <div class="divider"></div>
                    <input type="email" placeholder="Seu e-mail">
                </div>

                <div class="input-group">
                    <i class="fa-solid fa-address-card"></i>
                    <div class="divider"></div>
                    <input type="text" placeholder="CPF">
                </div>

                <div class="input-group">
                    <i class="fa-solid fa-car"></i>
                    <div class="divider"></div>
                    <input type="text" placeholder="Placa do Veículo">
                </div>

                <div class="input-group">
                    <i class="fa-solid fa-lock"></i>
                    <div class="divider"></div>
                    <input type="password" placeholder="Crie uma senha">
                </div>

                <button type="submit" class="submit-btn">Cadastrar Agora</button>
            </form>
        </div>
    </div>

</body>
</html>
