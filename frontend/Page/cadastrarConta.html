<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tela de Login / Cadastro</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Roboto', sans-serif;
        }

        body {
            background-color: #1e1e1e; /* Cor de fundo externa caso a tela seja maior */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            display: flex;
            width: 100%;
            max-width: 900px;
            height: 600px;
            background-color: #fff;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border-radius: 8px; /* Opcional, para deixar as bordas arredondadas */
            overflow: hidden;
        }

        /* --- LADO ESQUERDO (IMAGEM E LOGIN) --- */
        .left-panel {
            flex: 1;
            background-image: url('/Img/image.png'); /* Imagem de placeholder */
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* Sobreposição escura na imagem para dar contraste */
        .left-panel::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.4);
            z-index: 1;
        }

        .welcome-box {
            background-color: rgba(10, 15, 45, 0.7); /* Azul escuro translúcido */
            backdrop-filter: blur(4px);
            padding: 20px 30px;
            border-radius: 12px;
            text-align: center;
            color: #ffffff;
            z-index: 2;
            margin-bottom: 20px;
        }

        .welcome-box h2 {
            font-size: 1.4rem;
            font-weight: 500;
            line-height: 1.4;
        }

        .login-btn {
            background-color: #070d2b;
            color: #ffffff;
            border: none;
            padding: 12px 30px;
            font-size: 1rem;
            font-weight: 500;
            border-radius: 8px;
            cursor: pointer;
            z-index: 2;
            transition: background 0.3s ease;
        }

        .login-btn:hover {
            background-color: #0a1440;
        }

        /* --- LADO DIREITO (FORMULÁRIO) --- */
        .right-panel {
            flex: 1;
            background-color: #070a1a; /* Azul bem escuro */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
        }

        .right-panel h1 {
            color: #ffffff;
            font-size: 1.6rem;
            margin-bottom: 40px;
            font-weight: 500;
        }

        .form-container {
            width: 100%;
            max-width: 300px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .input-group {
            display: flex;
            align-items: center;
            background-color: #dbe8f8; /* Azul claro */
            border-radius: 8px;
            padding: 10px 15px;
        }

        .input-group i {
            color: #070a1a;
            font-size: 1.2rem;
            width: 25px; /* Para alinhar os ícones */
            text-align: center;
        }

        .divider {
            width: 2px;
            height: 20px;
            background-color: #070a1a;
            margin: 0 10px;
            opacity: 0.8;
        }

        .input-group input {
            border: none;
            background: transparent;
            outline: none;
            width: 100%;
            color: #070a1a;
            font-size: 1rem;
            font-weight: 700; /* Texto digitado mais forte */
        }

        .input-group input::placeholder {
            color: #070a1a;
            font-weight: 700;
            opacity: 0.9;
        }

        .submit-btn {
            background-color: #dbe8f8; /* Mesmo azul claro dos inputs */
            color: #070a1a;
            border: none;
            padding: 12px;
            font-size: 1.1rem;
            font-weight: 700;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 20px;
            transition: opacity 0.3s ease;
            width: 200px;
            align-self: center;
        }

        .submit-btn:hover {
            opacity: 0.9;
        }

        /* --- RESPONSIVIDADE --- */
        @media (max-width: 768px) {
            .container {
                flex-direction: column;
                height: auto;
                max-width: 100%;
                border-radius: 0;
            }
            .left-panel, .right-panel {
                padding: 40px 20px;
                min-height: 400px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="left-panel">
            <div class="welcome-box">
                <h2>Seja Bem-Vindo!<br>Já tem conta?<br>faça seu login!</h2>
            </div>
            <button class="login-btn">Logar Conta</button>
        </div>

        <div class="right-panel">
            <h1>Criar Conta</h1>
            
            <form class="form-container">
                <div class="input-group">
                    <i class="fa-regular fa-user-circle"></i>
                    <div class="divider"></div>
                    <input type="text" placeholder="Nome">
                </div>

                <div class="input-group">
                    <i class="fa-regular fa-envelope"></i>
                    <div class="divider"></div>
                    <input type="email" placeholder="Email">
                </div>

                <div class="input-group">
                    <i class="fa-solid fa-user-group"></i>
                    <div class="divider"></div>
                    <input type="text" placeholder="CPF">
                </div>

                <div class="input-group">
                    <i class="fa-solid fa-car"></i>
                    <div class="divider"></div>
                    <input type="text" placeholder="Placa">
                </div>

                <div class="input-group">
                    <i class="fa-solid fa-asterisk"></i>
                    <div class="divider"></div>
                    <input type="password" placeholder="Senha">
                </div>

                <button type="submit" class="submit-btn">Criar Conta</button>
            </form>
        </div>
    </div>

</body>
</html>
