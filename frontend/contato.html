<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato - EyesOnRoad</title>
    <link rel="stylesheet" href="/frontend/Css/contato.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

<header>
    <div class="logo">
        <i class="fa-solid fa-gauge-high"></i>
        <span>EyesOnRoad</span>
    </div>

    <nav>
        <a href="../index.html">Início</a>
        <a href="sobre.html">Sobre</a>
        <a href="recursos.html">Recursos</a>
        <a href="contato.html" class="active">Contato</a>
    </nav>
</header>

<section class="contato">

    <h1>Entre em Contato</h1>

    <p>
        Tem alguma dúvida, sugestão ou deseja saber mais sobre o EyesOnRoad?
        Entre em contato conosco.
    </p>

    <form>

        <input type="text" placeholder="Seu nome" required>

        <input type="email" placeholder="Seu e-mail" required>

        <input type="text" placeholder="Assunto" required>

        <textarea rows="8" placeholder="Digite sua mensagem"></textarea>

        <button type="submit" class="btn-um">
            <i class="fa-solid fa-paper-plane"></i>
            Enviar Mensagem
        </button>

    </form>

</section>

</body>
</html>
